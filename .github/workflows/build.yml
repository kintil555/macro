name: Build CustomMacro

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download official Gradle 9.2 wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://services.gradle.org/distributions/gradle-9.2-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          # Verify checksum (official from gradle.org/release-checksums)
          echo "423cb469ccc0ecc31f0e4e1c309976198ccb734cdcbb7029d4bda0f18f57e8d9  gradle/wrapper/gradle-wrapper.jar" | sha256sum -c -
          echo "Wrapper JAR checksum verified!"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.2'

      - name: Build mod
        run: gradle build --no-daemon --stacktrace

      - name: Upload mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: custommacro-${{ github.run_number }}
          path: build/libs/*[!-sources].jar
          if-no-files-found: error
          retention-days: 30

      - name: Show build result
        if: always()
        run: ls -lh build/libs/ 2>/dev/null || echo "No libs built"
